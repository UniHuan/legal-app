<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="description" content="法治同行 - 民法典科普平台">
<meta name="theme-color" content="#1A56DB">
<title>法治同行</title>
<link rel="stylesheet" href="styles.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../shared/api.js"></script>
</head>
<body>

<div class="app-frame">
  <!-- 状态栏 -->
  <div class="status-bar"><span>法治同行</span><span>📞 12348</span></div>

  <!-- 屏幕容器 -->
  <div class="screens" id="screenContainer">

    <!-- 首页 -->
    <div class="screen active" id="screen-home">
      <div class="content-area">
        <div class="search-bar" style="margin-bottom:12px;">
          <span>🔍</span>
          <input type="text" placeholder="比如：房东要卖房我能不搬吗？" id="homeSearch" onkeydown="if(event.key==='Enter')mobile.search(this.value)">
          <span style="cursor:pointer" onclick="mobile.navigate('ai')">🎤</span>
        </div>
        <div class="ai-entry" onclick="mobile.navigate('ai')">
          <span class="ai-icon" style="font-size:32px;margin-right:10px;">💬</span>
          <div><div class="ai-title" style="font-size:16px;font-weight:700;color:#1E40AF;">AI 智能问答</div><div class="ai-sub" style="font-size:12px;color:#64748B;">免费不限次</div></div>
        </div>
        <div class="section-title">📂 场景分类</div>
        <div class="grid-9" id="homeCategories"></div>
        <div class="section-title">🔥 大家都在看</div>
        <div id="hotScenes"><div class="loading">加载中...</div></div>
      </div>
    </div>

    <!-- 价值观 -->
    <div class="screen" id="screen-values">
      <div class="content-area">
        <div class="section-title">🌍 价值观地图</div>
        <div id="valuesList"><div class="loading">加载中...</div></div>
      </div>
    </div>

    <!-- 法典 -->
    <div class="screen" id="screen-code">
      <div class="content-area">
        <div class="search-bar" style="margin-bottom:10px;">
          <span>🔍</span>
          <input type="text" placeholder="搜索法条或编号直达..." id="codeSearch" onkeydown="if(event.key==='Enter')mobile.searchCode(this.value)">
        </div>
        <div id="codeList"><div class="loading">加载中...</div></div>
      </div>
    </div>

    <!-- AI -->
    <div class="screen" id="screen-ai">
      <div class="ai-fullscreen">
        <div class="ai-header">💬 AI 智能问答 <button class="close" onclick="mobile.goHome()">关闭</button></div>
        <div class="ai-presets" id="aiPresets"></div>
        <div class="ai-messages" id="aiMessages">
          <div style="text-align:center;color:#64748B;padding:40px;"><div style="font-size:40px;">💬</div><div>法律问题，直接问我</div></div>
        </div>
        <div class="ai-input-area">
          <input type="text" placeholder="输入法律问题..." id="aiInput" onkeydown="if(event.key==='Enter')mobile.askAI()">
          <button class="send" onclick="mobile.askAI()">↑</button>
        </div>
      </div>
    </div>

    <!-- 场景详情 -->
    <div class="screen" id="screen-scene">
      <div class="scene-detail-page" id="sceneContent"><div class="loading">加载中...</div></div>
    </div>

    <!-- 分类列表 -->
    <div class="screen" id="screen-category">
      <div class="content-area" id="categoryContent"><div class="loading">加载中...</div></div>
    </div>

    <!-- 法条详情 -->
    <div class="screen" id="screen-article">
      <div class="article-detail" id="articleContent"><div class="loading">加载中...</div></div>
    </div>

    <!-- 工具 -->
    <div class="screen" id="screen-tools">
      <div class="content-area" id="toolsContent"></div>
    </div>

    <!-- 每日一题 -->
    <div class="screen" id="screen-quiz">
      <div class="content-area" id="quizContent"><div class="loading">加载中...</div></div>
    </div>

    <!-- 价值观详情 -->
    <div class="screen" id="screen-value-detail">
      <div class="content-area" id="valueDetailContent"><div class="loading">加载中...</div></div>
    </div>
  </div>

  <!-- 底部导航 -->
  <div class="bottom-nav">
    <button class="nav-item active" data-page="home" onclick="mobile.navigate('home')">
      <span class="icon">🏠</span>场景学法
    </button>
    <button class="nav-item" data-page="values" onclick="mobile.navigate('values')">
      <span class="icon">🌍</span>价值观
    </button>
    <button class="nav-item" data-page="code" onclick="mobile.navigate('code')">
      <span class="icon">📖</span>法典全文
    </button>
    <button class="nav-item" data-page="ai" onclick="mobile.navigate('ai')">
      <span class="icon">💬</span>AI问答
    </button>
  </div>

  <a class="hotline-fixed" href="tel:12348">📞</a>
</div>

<script src="app.js"></script>
</body>
</html>
