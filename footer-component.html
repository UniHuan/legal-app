<title>UniHuan 页脚组件预览</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;color:#333;min-height:100vh;display:flex;flex-direction:column}

/* === 模拟页面内容 === */
.page-content{flex:1;display:flex;align-items:center;justify-content:center;background:#f5f5f5;font-size:18px;color:#999;padding:60px 0}
/* === UniHuan 页脚 === */
.site-footer{background:#1a1a2e;color:#ccc;padding:40px 0 0;font-size:14px}
.footer-wrap{max-width:1200px;margin:0 auto;padding:0 24px}
.footer-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:32px;padding-bottom:32px;border-bottom:1px solid rgba(255,255,255,.1)}
@media(max-width:768px){.footer-grid{grid-template-columns:repeat(2,1fr)}}
.footer-col h4{color:#fff;font-size:15px;margin-bottom:16px;font-weight:600}
.footer-col a{display:block;color:#999;text-decoration:none;padding:4px 0;font-size:13px;transition:color .2s}
.footer-col a:hover{color:#fff}

/* 法治同行特殊高亮 */
.footer-col .legal-link{
  display:inline-flex;align-items:center;gap:6px;
  background:linear-gradient(135deg,rgba(26,86,219,.2),rgba(59,130,246,.15));
  border:1px solid rgba(26,86,219,.3);border-radius:8px;
  padding:8px 14px;color:#60A5FA !important;font-weight:600;
  margin-top:8px;transition:all .2s
}
.footer-col .legal-link:hover{background:rgba(26,86,219,.3);border-color:rgba(26,86,219,.5);color:#93C5FD !important}
.footer-col .legal-link .legal-badge{
  background:#DC2626;color:#fff;border-radius:10px;
  padding:1px 8px;font-size:10px;font-weight:600
}

.footer-bottom{
  display:flex;justify-content:space-between;align-items:center;
  padding:20px 0;flex-wrap:wrap;gap:12px
}
.footer-bottom .copyright{color:#666;font-size:12px}
.footer-bottom-links{display:flex;gap:20px;flex-wrap:wrap}
.footer-bottom-links a{color:#666;text-decoration:none;font-size:12px;transition:color .2s}
.footer-bottom-links a:hover{color:#ccc}
.footer-bottom-links .highlight{color:#60A5FA;font-weight:600}

/* 12348热线 */
.hotline-strip{background:#DC2626;color:#fff;text-align:center;padding:12px;font-size:14px;font-weight:600;letter-spacing:1px}
.hotline-strip a{color:#fff;text-decoration:none}
</style>
</head>
