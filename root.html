<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>法治同行</title>
<script>
(function(){
  var w=window.innerWidth;
  // Mobile (<900px) → mobile/  Desktop → desktop/
  if(w<900) location.href='mobile/';
  else location.href='desktop/';
})();
</script></head><body></body></html>
