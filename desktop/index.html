<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="法治同行 - 民法典科普平台">
<title>法治同行 - 一本你真正能读懂的民法典</title>
<link rel="stylesheet" href="styles.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../shared/api.js"></script>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-logo" onclick="desktop.navigate('home')"><span class="logo-icon">⚖️</span><div><div class="logo-text">法治同行</div><div class="logo-sub">民法典科普平台</div></div></div>
    <nav class="sidebar-nav">
      <div class="nav-section">主导航</div>
      <button class="nav-link active" data-page="home"><span class="nav-icon">🏠</span><span>首页</span></button>
      <button class="nav-link" data-page="values"><span class="nav-icon">🌍</span><span>价值观地图</span></button>
      <button class="nav-link" data-page="code"><span class="nav-icon">📖</span><span>法典全文</span></button>
      <button class="nav-link" data-page="ai"><span class="nav-icon">💬</span><span>AI 智能问答</span><span class="nav-badge">免费</span></button>
      <button class="nav-link" data-page="tools"><span class="nav-icon">🛠️</span><span>便民工具</span></button>
      <div class="nav-section">学习</div>
      <button class="nav-link" data-page="quiz"><span class="nav-icon">📝</span><span>每日一题</span></button>
    </nav>
    <div class="sidebar-footer"><span>📞 法律援助热线</span><div class="hotline" onclick="location.href='tel:12348'">12348</div></div>
  </aside>
  <main class="main-content">
    <div class="top-bar">
      <div class="search-box"><span>🔍</span><input type="text" placeholder="描述你的情况..." id="globalSearch" onkeydown="if(event.key==='Enter')desktop.searchGlobal(this.value)"><span class="search-hint">⌘K</span></div>
      <div class="top-actions"><button class="btn-elders" onclick="document.body.classList.toggle('elders-mode')">👴 银发模式</button></div>
    </div>
    <div class="page active" id="page-home"></div>
    <div class="page" id="page-values" style="padding:24px"></div>
    <div class="page" id="page-code" style="padding:24px"></div>
    <div class="page" id="page-ai" style="padding:0;">
      <div class="ai-layout">
        <div class="ai-chat">
          <div class="ai-chat-header"><span>💬</span><span class="ai-name">AI 智能问答</span><span class="ai-badge">免费·不限次</span></div>
          <div class="ai-messages"><div class="ai-welcome"><div>💬</div><div>法律问题，直接问我</div><div style="font-size:13px;margin-top:4px;">基于民法典全量知识库+AI智能分析</div><div style="font-size:11px;color:#94A3B8;margin-top:8px;">本回答不构成正式法律意见</div></div></div>
          <div class="ai-input-area"><textarea placeholder="输入你的法律问题..." id="aiTextarea" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();desktop.askAI()}"></textarea><button class="send-btn" onclick="desktop.askAI()">↑</button></div>
        </div>
        <div class="ai-sidebar">
          <div class="side-card"><h4>⚡ 试试这些问题</h4>
            <div class="rel-item" onclick="desktop.quickAsk('房东卖房我能不搬吗')">🏠 房东卖房，租客能继续住吗？</div>
            <div class="rel-item" onclick="desktop.quickAsk('收到假货退一赔三怎么操作')">🛒 买到假货，怎么索赔？</div>
            <div class="rel-item" onclick="desktop.quickAsk('没打借条能要回钱吗')">💰 没打借条，怎么要回欠款？</div>
          </div>
        </div>
      </div>
    </div>
    <div class="page" id="page-scene" style="padding:24px"></div>
    <div class="page" id="page-article" style="padding:24px"></div>
    <div class="page" id="page-tools" style="padding:24px"></div>
    <div class="page" id="page-quiz" style="padding:24px"></div>
    <div class="page" id="page-value-detail"></div>
    <div class="page" id="page-category" style="padding:24px"></div>
  </main>
</div>
<script src="app.js"></script>
</body>
</html>
