/* ===== 页脚嵌入式快速入口 ===== */
.footer-widget{

  padding:4px 10px;font-size:11px;font-weight:600
}
/* ===== 页脚快速链接样式 ===== */
.footer-links-bar{
  display:flex;justify-content:center;align-items:center;gap:24px;
  padding:16px 24px;background:#fff;border-top:1px solid #E2E8F0;
  flex-wrap:wrap;font-size:13px;color:#64748B;
}
.footer-links-bar a{color:#64748B;text-decoration:none;transition:color .15s}
.footer-links-bar a:hover{color:var(--blue)}
.footer-links-bar .highlight-link{

.lite-search input{flex:1;padding:12px 16px;border:none;background:transparent;color:#fff;font-size:14px;outline:none}
.lite-search input::placeholder{color:rgba(255,255,255,.5)}
.lite-search button{padding:12px 20px;background:#fff;color:var(--blue);border:none;font-weight:600;cursor:pointer;font-size:14px}
.lite-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:24px;max-width:800px;margin:0 auto}
@media(max-width:500px){.lite-grid{grid-template-columns:repeat(2,1fr)}}
.lite-card{background:#fff;border-radius:12px;padding:20px 12px;text-align:center;text-decoration:none;color:inherit;border:1px solid #E2E8F0;transition:all .15s}
.lite-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.08);border-color:var(--blue)}

.lite-card .lc-title{font-weight:600;font-size:14px}
.lite-card .lc-count{font-size:11px;color:#64748B;margin-top:4px}
.lite-cta{text-align:center;padding:16px}
.lite-cta a{display:inline-block;padding:12px 32px;background:var(--blue);color:#fff;border-radius:12px;text-decoration:none;font-weight:600;font-size:15px}
.lite-footer{text-align:center;padding:20px;font-size:12px;color:#94A3B8;border-top:1px solid #E2E8F0}
.lite-footer a{color:var(--blue)}
.hotline-fixed{position:fixed;bottom:20px;right:20px;background:var(--red);color:#fff;padding:12px 20px;border-radius:24px;font-weight:700;text-decoration:none;box-shadow:0 4px 16px rgba(220,38,38,.3);z-index:999;font-size:14px}
